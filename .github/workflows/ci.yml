name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install rclone
        # Used by integration tests. They skip if rclone is missing, but CI
        # should always run the full suite.
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
