name: Bug report
description: Something's not working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "`csk backup` exited with …"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `csk doctor`
      description: Redact any remote credentials before pasting.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "`csk --version` or commit hash."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Commands, config, anything that helps.
