name: Feature request
description: Suggest a new capability or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: A sketch of the CLI / MCP surface or config change.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
